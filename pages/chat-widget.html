<button id="chatBtn" onclick="ChatWidget.toggle()"><span id="chatIcon"><img src="icons/chat_logo.webp" id="chatLogoImg" alt="chat" style="width:32px;height:32px;object-fit:cover;border-radius:50%;display:block"></span></button>
<div id="chatWin">
  <div id="chatHead">
    <div style="display:flex;align-items:center;gap:9px"><span style="font-size:20px">🌹</span><div><div style="font-weight:700;font-size:13.5px">Golapi সহায়ক</div><div style="font-size:11px;opacity:.85">প্রায় সাথে সাথেই উত্তর দেয়</div></div></div>
    <button onclick="ChatWidget.toggle()" style="color:inherit;font-size:18px;background:none;border:none">✕</button>
  </div>
  <div id="chatBody"></div>
  <div id="chatFoot">
    <input id="chatInput" placeholder="মেসেজ লিখুন..." onkeydown="if(event.key==='Enter')ChatWidget.send()">
    <button onclick="ChatWidget.send()">➤</button>
  </div>
</div>
