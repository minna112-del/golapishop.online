<div class="page driver-page" id="page-driver">
  <section class="driver-shell">
    <a href="#" class="driver-back" onclick="Router.go('home');return false" aria-label="সাইটে ফিরে যান">← সাইটে ফিরে যান</a>

    <div id="driverLoginBox" class="driver-login-wrap">
      <div class="driver-login-card">
        <div class="driver-brandmark" aria-hidden="true">🚴</div>
        <p class="driver-eyebrow">Golapi Shop Delivery</p>
        <h1 class="driver-title">ড্রাইভার পোর্টাল</h1>
        <p class="driver-subtitle">শুধু অনুমোদিত ড্রাইভার অ্যাকাউন্ট দিয়ে প্রবেশ করুন।</p>
        <div id="driverLoginMsg" class="form-msg" role="status" aria-live="polite"></div>
        <div class="driver-login-form">
          <div class="field"><label for="driverEmail">ইমেইল</label><input type="email" id="driverEmail" autocomplete="username" inputmode="email" placeholder="name@example.com"></div>
          <div class="field"><label for="driverPassword">পাসওয়ার্ড</label><input type="password" id="driverPassword" autocomplete="current-password" placeholder="আপনার পাসওয়ার্ড"></div>
          <button id="driverLoginBtn" class="btn btn-gold btn-block" onclick="DriverPortal.login()">লগইন করুন</button>
        </div>
      </div>
    </div>

    <div id="driverDashBox" class="driver-dashboard" style="display:none">
      <header class="driver-dash-head">
        <div>
          <p class="driver-eyebrow">ডেলিভারি কার্যক্রম</p>
          <h1 class="driver-title"><span id="driverNameLabel"></span></h1>
          <p id="driverZoneLabel" class="driver-subtitle"></p>
        </div>
        <button class="btn btn-outline driver-logout" onclick="DriverPortal.logout()">লগআউট</button>
      </header>

      <section class="driver-availability" id="driverOnlineBox" aria-label="ড্রাইভার উপস্থিতি">
        <div>
          <div class="driver-online-label" id="driverOnlineLabel">অনলাইন — অর্ডার নেওয়ার জন্য প্রস্তুত</div>
          <div class="driver-online-help">অফলাইন করলে নতুন অর্ডার অ্যাসাইন হবে না</div>
        </div>
        <label class="driver-switch" aria-label="অনলাইন স্ট্যাটাস পরিবর্তন করুন">
          <input type="checkbox" id="driverOnlineToggle" checked onchange="DriverPortal.toggleOnline(this.checked)">
          <span id="driverToggleSlider" class="driver-switch-track"></span>
        </label>
      </section>

      <section class="driver-stat-grid" aria-label="ডেলিভারি সারাংশ">
        <article class="driver-stat-card"><span>সক্রিয়</span><strong id="dStatAssigned">০</strong></article>
        <article class="driver-stat-card"><span>পথে আছে</span><strong id="dStatTransit">০</strong></article>
        <article class="driver-stat-card"><span>আজ সম্পন্ন</span><strong id="dStatDone">০</strong></article>
      </section>

      <nav class="driver-tabs" aria-label="অর্ডার তালিকা">
        <button id="driverTabActive" class="driver-tab is-active" onclick="DriverPortal.switchTab('active')" aria-selected="true">সক্রিয় অর্ডার</button>
        <button id="driverTabHistory" class="driver-tab" onclick="DriverPortal.switchTab('history')" aria-selected="false">ডেলিভারি ইতিহাস</button>
      </nav>

      <div id="driverOrdersList" class="driver-order-list" aria-live="polite"></div>
    </div>
  </section>
</div>
