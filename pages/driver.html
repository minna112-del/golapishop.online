<div class="page" id="page-driver">
  <section class="sec" style="max-width:560px">
    <a href="#" onclick="Router.go('home')" style="font-size:12.5px;color:var(--ink-muted);display:inline-block;margin-bottom:16px">← সাইটে ফিরে যান</a>
    <div id="driverLoginBox">
      <h2 class="tiro" style="font-size:20px;margin-bottom:6px">🚴 ড্রাইভার লগইন</h2>
      <p style="color:var(--ink-muted);font-size:13px;margin-bottom:18px">মোবাইল নম্বর ও পিন দিয়ে লগইন করুন</p>
      <div id="driverLoginMsg" class="form-msg"></div>
      <div class="card-box">
        <div class="field"><label>মোবাইল নম্বর</label><input type="tel" id="driverPhone"></div>
        <div class="field"><label>পিন</label><input type="password" id="driverPin"></div>
        <button class="btn btn-gold btn-block" onclick="DriverPortal.login()">লগইন করুন</button>
      </div>
    </div>
    <div id="driverDashBox" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h2 class="tiro" style="font-size:19px">🚴 <span id="driverNameLabel"></span></h2><button class="btn btn-outline" style="padding:7px 14px;font-size:12px" onclick="DriverPortal.logout()">লগআউট</button></div>
      <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><div class="lbl">অ্যাসাইনড</div><div class="val" id="dStatAssigned">০</div></div>
        <div class="stat-card"><div class="lbl">পথে আছে</div><div class="val rose" id="dStatTransit">০</div></div>
        <div class="stat-card"><div class="lbl">আজ সম্পন্ন</div><div class="val" id="dStatDone">০</div></div>
      </div>
      <h3 style="font-size:14px;color:#fff;margin-bottom:10px">আপনার অর্ডারসমূহ</h3>
      <div id="driverOrdersList"></div>
    </div>
  </section>
</div>
