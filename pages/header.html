<style>
  #custHeader .header-row{position:relative}
  #custHeader .logo{min-width:0;color:inherit}
  #custHeader .logo .mark{overflow:hidden;transform:none;border:1px solid rgba(240,53,107,.14);box-shadow:0 8px 24px rgba(24,17,20,.08)}
  #custHeader .logo .mark img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
  #custHeader .brand-copy{min-width:0;line-height:1.15}
  #custHeader .word{white-space:nowrap;letter-spacing:-.2px}
  #custHeader .tag{margin-top:3px;white-space:nowrap}
  #custHeader .search-wrap{isolation:isolate}
  #custHeader .search-wrap input{padding-right:92px;box-shadow:0 1px 0 rgba(24,17,20,.02);transition:border-color .2s,box-shadow .2s,background .2s}
  #custHeader .search-wrap input:focus{box-shadow:0 0 0 4px rgba(240,53,107,.1)}
  #custHeader .search-icon-pair{position:absolute;right:5px;top:50%;transform:translateY(-50%);display:flex;align-items:center;height:36px;padding:0 2px;border-radius:10px;background:var(--card);z-index:2}
  #custHeader .search-wrap .search-icon-btn{position:static;transform:none;width:34px;height:32px;border-radius:8px;color:var(--ink-muted);transition:background .2s,color .2s}
  #custHeader .search-wrap .search-icon-btn:hover,
  #custHeader .search-wrap .search-icon-btn:focus-visible{background:rgba(240,53,107,.08);color:var(--rose);outline:none}
  #custHeader .search-icon-divider{width:1px;height:18px;background:var(--line);flex:0 0 auto}
  #custHeader #searchSuggestBox{background:var(--card);border:1px solid var(--line-l);border-radius:14px;box-shadow:0 18px 45px rgba(24,17,20,.14);z-index:250;max-height:340px;overflow-y:auto}
  #custHeader .header-actions .icon-btn{min-height:40px}
  #custHeader .catnav .inner{min-height:48px}
  #custHeader .catnav a{display:inline-flex;align-items:center;gap:5px}
  #custHeader .nav-icon{width:13px;height:13px;flex:0 0 auto}
  #custHeader .nav-logo{width:16px;height:16px;object-fit:cover;border-radius:4px;flex:0 0 auto}
  @media(max-width:768px){
    #custHeader .logo .mark{width:38px;height:38px;border-radius:11px}
    #custHeader .logo .brand-copy{display:none}
    #custHeader .search-wrap input{padding-left:12px;padding-right:82px}
    #custHeader .header-actions{gap:5px}
    #custHeader .header-actions .icon-btn{width:40px;height:40px;min-height:40px;padding:0;justify-content:center}
    #custHeader nav.catnav .inner{padding:0 10px}
  }
  @media(max-width:390px){
    #custHeader .header-row{gap:5px!important}
    #custHeader .logo .mark{width:36px;height:36px}
    #custHeader .search-wrap input{padding-right:46px}
    #custHeader #voiceSearchBtn,
    #custHeader .search-icon-divider{display:none}
  }
</style>

<header class="main" id="custHeader">
  <div class="header-row">
    <a href="#" onclick="Router.go('home');return false" class="logo" aria-label="Golapi Shop Online হোমপেজ">
      <span class="mark" aria-hidden="true">
        <img src="icons/head_logo.webp" alt="">
      </span>
      <span class="brand-copy">
        <span class="word">Golapi<span class="g">Shop</span><span class="r">.online</span></span>
        <span class="tag">নোয়াখালীর বিশ্বস্ত অনলাইন শপ</span>
      </span>
    </a>

    <div class="search-wrap" id="searchWrapDesktop">
      <input
        type="search"
        id="searchInput"
        aria-label="প্রোডাক্ট খুঁজুন"
        aria-controls="searchSuggestBox"
        autocomplete="off"
        enterkeyhint="search"
        placeholder="প্রোডাক্ট, ব্র্যান্ড বা ক্যাটাগরি খুঁজুন..."
        oninput="doSearch(this.value)"
        onfocus="doSearch(this.value)"
        onblur="setTimeout(()=>{const box=document.getElementById('searchSuggestBox');if(box)box.style.display='none'},200)"
      >
      <div class="search-icon-pair" aria-label="সার্চ অপশন">
        <button type="button" class="search-icon-btn" onclick="toggleVoiceSearch()" id="voiceSearchBtn" title="ভয়েস সার্চ" aria-label="ভয়েস সার্চ">
          <span class="ic ic-mic" aria-hidden="true"></span>
        </button>
        <span class="search-icon-divider" aria-hidden="true"></span>
        <button type="button" class="search-icon-btn" onclick="submitSearch()" title="সার্চ করুন" aria-label="সার্চ করুন">
          <span class="ic ic-search" aria-hidden="true"></span>
        </button>
      </div>
      <div id="searchSuggestBox" role="listbox" aria-label="সার্চ সাজেশন" style="display:none;position:absolute;top:100%;left:0;right:0;margin-top:7px"></div>
    </div>

    <div class="header-actions" aria-label="অ্যাকাউন্ট ও কার্ট">
      <button type="button" class="icon-btn" id="loginBtn" onclick="AccountPage.openOrLogin()" aria-label="লগইন বা অ্যাকাউন্ট খুলুন">
        <span class="ic ic-user" style="width:15px;height:15px" aria-hidden="true"></span>
        <span id="accLabel" class="hide-sm">লগইন</span>
      </button>
      <button type="button" class="icon-btn" id="cartBtn" onclick="Cart.open()" aria-label="শপিং কার্ট খুলুন">
        <span class="ic ic-cart" style="width:15px;height:15px" aria-hidden="true"></span>
        <span class="hide-sm">কার্ট</span>
        <span class="cart-badge" id="cartBadge" style="display:none" aria-live="polite">0</span>
      </button>
    </div>
  </div>

  <nav class="catnav" aria-label="প্রধান পণ্য বিভাগ">
    <div class="inner">
      <a href="#" onclick="Router.go('custom-bazar');return false" class="flash" data-bn="<span class='ic ic-pencil nav-icon'></span><span>কাস্টম বাজার</span>" data-en="<span class='ic ic-pencil nav-icon'></span><span>Custom Bazar</span>">
        <span class="ic ic-pencil nav-icon" aria-hidden="true"></span><span>কাস্টম বাজার</span>
      </a>
      <a href="#" onclick="Router.go('medical');return false" class="medical" data-bn="<img src='icons/dr_logo.webp' class='nav-logo' alt=''><span>স্বাস্থ্য সেবা</span>" data-en="<img src='icons/dr_logo.webp' class='nav-logo' alt=''><span>Health Service</span>">
        <img src="icons/dr_logo.webp" class="nav-logo" alt=""><span>স্বাস্থ্য সেবা</span>
      </a>
      <a href="#" onclick="Router.go('listing',{cat:'all'});return false" data-bn="<span>সব ক্যাটাগরি</span><span class='ic ic-chevron-down' style='width:10px;height:10px'></span>" data-en="<span>All Categories</span><span class='ic ic-chevron-down' style='width:10px;height:10px'></span>">
        <span>সব ক্যাটাগরি</span><span class="ic ic-chevron-down" style="width:10px;height:10px" aria-hidden="true"></span>
      </a>
      <a href="#" onclick="Router.go('listing',{cat:'medicine'});return false" data-bn="<span class='ic ic-pill nav-icon'></span><span>ঔষধ</span>" data-en="<span class='ic ic-pill nav-icon'></span><span>Medicine</span>">
        <span class="ic ic-pill nav-icon" aria-hidden="true"></span><span>ঔষধ</span>
      </a>
      <a href="#" onclick="Router.go('listing',{cat:'grocery'});return false" data-bn="<span class='ic ic-cart nav-icon'></span><span>মুদি বাজার</span>" data-en="<span class='ic ic-cart nav-icon'></span><span>Grocery</span>">
        <span class="ic ic-cart nav-icon" aria-hidden="true"></span><span>মুদি বাজার</span>
      </a>
      <a href="#" onclick="Router.go('listing',{cat:'gas'});return false" data-bn="<span class='ic ic-flame nav-icon'></span><span>গ্যাস সিলিন্ডার</span>" data-en="<span class='ic ic-flame nav-icon'></span><span>Gas Cylinder</span>">
        <span class="ic ic-flame nav-icon" aria-hidden="true"></span><span>গ্যাস সিলিন্ডার</span>
      </a>
      <a href="#" onclick="Router.go('listing',{cat:'cosmetics'});return false" data-bn="<span class='ic ic-sparkle nav-icon'></span><span>কসমেটিকস</span>" data-en="<span class='ic ic-sparkle nav-icon'></span><span>Cosmetics</span>">
        <span class="ic ic-sparkle nav-icon" aria-hidden="true"></span><span>কসমেটিকস</span>
      </a>
      <a href="#" onclick="Router.go('listing',{cat:'flash'});return false" class="gold" data-bn="<span class='ic ic-flame nav-icon'></span><span>ফ্ল্যাশ সেল</span>" data-en="<span class='ic ic-flame nav-icon'></span><span>Flash Sale</span>">
        <span class="ic ic-flame nav-icon" aria-hidden="true"></span><span>ফ্ল্যাশ সেল</span>
      </a>
    </div>
  </nav>
</header>
