<header class="main" id="custHeader">
  <div class="header-row">
    <a href="#" onclick="Router.go('home')" class="logo">
      <div class="mark"><img src="icons/head_logo.webp" alt="Golapi Shop" style="width:100%;height:100%;object-fit:cover;border-radius:12px"></div>
      <div><div class="word">Golapi<span class="g">Shop</span><span class="r">.online</span></div><div class="tag">নোয়াখালীর বিশ্বস্ত অনলাইন শপ</div></div>
    </a>
    <div class="search-wrap" id="searchWrapDesktop" style="position:relative">
      <input type="search" id="searchInput" placeholder="প্রোডাক্ট, ব্র্যান্ড বা ক্যাটাগরি খুঁজুন..." oninput="doSearch(this.value)" onfocus="doSearch(this.value)" onblur="setTimeout(()=>document.getElementById('searchSuggestBox').style.display='none',200)">
      <div class="search-icon-pair">
        <button class="search-icon-btn" onclick="toggleVoiceSearch()" id="voiceSearchBtn" title="ভয়েস সার্চ"><span class="ic ic-mic"></span></button>
        <span class="search-icon-divider"></span>
        <button class="search-icon-btn" onclick="submitSearch()" title="সার্চ করুন"><span class="ic ic-search"></span></button>
      </div>
      <div id="searchSuggestBox" style="display:none;position:absolute;top:100%;left:0;right:0;margin-top:6px;background:var(--card);border:1px solid var(--line-l);border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.15);z-index:250;max-height:340px;overflow-y:auto"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="loginBtn" onclick="AccountPage.openOrLogin()"><span class="ic ic-user" style="width:15px;height:15px"></span><span id="accLabel" class="hide-sm">লগইন</span></button>
      <button class="icon-btn" id="cartBtn" onclick="Cart.open()" style="position:relative"><span class="ic ic-cart" style="width:15px;height:15px"></span><span class="hide-sm">কার্ট</span><span class="cart-badge" id="cartBadge" style="display:none">0</span></button>
    </div>
  </div>
  <nav class="catnav">
    <div class="inner">
      <a href="#" onclick="Router.go('custom-bazar')" class="flash" data-bn="কাস্টম বাজার" data-en="Custom Bazar"><span class="ic ic-pencil" style="width:13px;height:13px;margin-right:5px;vertical-align:-2px"></span>কাস্টম বাজার</a>
      <a href="#" onclick="Router.go('medical')" class="medical" style="display:inline-flex;align-items:center" data-bn='<img src="icons/dr_logo.webp" style="width:16px;height:16px;object-fit:cover;border-radius:4px;flex-shrink:0"> <span>ডাক্তার এপয়েন্টমেন্ট</span>' data-en='<img src="icons/dr_logo.webp" style="width:16px;height:16px;object-fit:cover;border-radius:4px;flex-shrink:0"> <span>Doctor Appointment</span>'><img src="icons/dr_logo.webp" style="width:16px;height:16px;object-fit:cover;border-radius:4px;flex-shrink:0;margin-right:5px"><span>ডাক্তার এপয়েন্টমেন্ট</span></a>
      <a href="#" onclick="Router.go('listing',{cat:'all'})" data-bn="সব ক্যাটাগরি" data-en="All Categories" style="display:inline-flex;align-items:center;gap:4px">সব ক্যাটাগরি<span class="ic ic-chevron-down" style="width:10px;height:10px"></span></a>
      <a href="#" onclick="Router.go('listing',{cat:'medicine'})" style="display:inline-flex;align-items:center" data-bn='<span class="ic ic-pill" style="width:13px;height:13px;margin-right:5px"></span><span>ঔষধ</span>' data-en='<span class="ic ic-pill" style="width:13px;height:13px;margin-right:5px"></span><span>Medicine</span>'><span class="ic ic-pill" style="width:13px;height:13px;margin-right:5px"></span><span>ঔষধ</span></a>
      <a href="#" onclick="Router.go('listing',{cat:'grocery'})" style="display:inline-flex;align-items:center" data-bn='<span class="ic ic-cart" style="width:13px;height:13px;margin-right:5px"></span><span>মুদি বাজার</span>' data-en='<span class="ic ic-cart" style="width:13px;height:13px;margin-right:5px"></span><span>Grocery</span>'><span class="ic ic-cart" style="width:13px;height:13px;margin-right:5px"></span><span>মুদি বাজার</span></a>
      <a href="#" onclick="Router.go('listing',{cat:'gas'})" style="display:inline-flex;align-items:center" data-bn='<span class="ic ic-flame" style="width:13px;height:13px;margin-right:5px"></span><span>গ্যাস সিলিন্ডার</span>' data-en='<span class="ic ic-flame" style="width:13px;height:13px;margin-right:5px"></span><span>Gas Cylinder</span>'><span class="ic ic-flame" style="width:13px;height:13px;margin-right:5px"></span><span>গ্যাস সিলিন্ডার</span></a>
      <a href="#" onclick="Router.go('listing',{cat:'cosmetics'})" style="display:inline-flex;align-items:center" data-bn='<span class="ic ic-sparkle" style="width:13px;height:13px;margin-right:5px"></span><span>কসমেটিকস</span>' data-en='<span class="ic ic-sparkle" style="width:13px;height:13px;margin-right:5px"></span><span>Cosmetics</span>'><span class="ic ic-sparkle" style="width:13px;height:13px;margin-right:5px"></span><span>কসমেটিকস</span></a>
      <a href="#" onclick="Router.go('listing',{cat:'flash'})" class="gold" style="display:inline-flex;align-items:center" data-bn='<span class="ic ic-flame" style="width:13px;height:13px;margin-right:5px"></span><span>ফ্ল্যাশ সেল</span>' data-en='<span class="ic ic-flame" style="width:13px;height:13px;margin-right:5px"></span><span>Flash Sale</span>'><span class="ic ic-flame" style="width:13px;height:13px;margin-right:5px"></span><span>ফ্ল্যাশ সেল</span></a>
    </div>
  </nav>
</header>
