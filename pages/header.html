<header class="main" id="custHeader">
  <div class="header-row">
    <a href="#" onclick="Router.go('home')" class="logo">
      <div class="mark"><img src="icons/head_logo.webp" alt="Golapi Shop" style="width:100%;height:100%;object-fit:cover;border-radius:12px"></div>
      <div><div class="word">Golapi<span class="g">Shop</span><span class="r">.online</span></div><div class="tag">নোয়াখালীর বিশ্বস্ত অনলাইন শপ</div></div>
    </a>
    <div class="search-wrap" id="searchWrapDesktop" style="position:relative">
      <input type="search" id="searchInput" placeholder="প্রোডাক্ট, ব্র্যান্ড বা ক্যাটাগরি খুঁজুন..." oninput="doSearch(this.value)" onfocus="doSearch(this.value)" onblur="setTimeout(()=>document.getElementById('searchSuggestBox').style.display='none',200)">
      <div class="search-icon-pair">
        <button class="search-icon-btn" onclick="toggleVoiceSearch()" id="voiceSearchBtn" title="ভয়েস সার্চ"><span class="ic ic-mic"></span></button>
        <span class="search-icon-divider"></span>
        <button class="search-icon-btn" onclick="submitSearch()" title="সার্চ করুন"><span class="ic ic-search"></span></button>
      </div>
      <div id="searchSuggestBox" style="display:none;position:absolute;top:100%;left:0;right:0;margin-top:6px;background:var(--card);border:1px solid var(--line-l);border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.15);z-index:250;max-height:340px;overflow-y:auto"></div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" onclick="ThemeToggle.toggle()" title="থিম: অটো / লাইট / ডার্ক (ট্যাপ করে পাল্টান)">
        <span class="mode-auto">🌗</span><span class="mode-light">☀️</span><span class="mode-dark">🌙</span>
      </button>
      <button class="icon-btn" onclick="toggleLang()" id="langBtn" title="Change language / ভাষা পরিবর্তন">🌐 <span id="langBtnLabel">EN</span></button>
      <button class="icon-btn" id="loginBtn" onclick="AccountPage.openOrLogin()"><span>👤</span><span id="accLabel" class="hide-sm">লগইন</span></button>
      <button class="icon-btn" id="cartBtn" onclick="Cart.open()" style="position:relative"><span>🛍️</span><span class="hide-sm">কার্ট</span><span class="cart-badge" id="cartBadge" style="display:none">0</span></button>
    </div>
  </div>
  <nav class="catnav">
    <div class="inner">
      <a href="#" onclick="Router.go('custom-bazar')" class="flash" data-bn="📝 কাস্টম বাজার" data-en="📝 Custom Bazar">📝 কাস্টম বাজার</a>
      <a href="#" onclick="Router.go('medical')" class="medical" data-bn='<img src="icons/dr_logo.webp" style="width:16px;height:16px;object-fit:cover;border-radius:4px;vertical-align:middle;margin-right:4px"> ফ্রী স্বাস্থ্য সেবা' data-en='<img src="icons/dr_logo.webp" style="width:16px;height:16px;object-fit:cover;border-radius:4px;vertical-align:middle;margin-right:4px"> Free Health Care'><img src="icons/dr_logo.webp" style="width:16px;height:16px;object-fit:cover;border-radius:4px;vertical-align:middle;margin-right:4px"> ফ্রী স্বাস্থ্য সেবা</a>
      <a href="#" onclick="Router.go('listing',{cat:'all'})" data-bn="সব ক্যাটাগরি ▾" data-en="All Categories ▾">সব ক্যাটাগরি ▾</a>
      <a href="#" onclick="Router.go('listing',{cat:'medicine'})" data-bn="💊 ঔষধ" data-en="💊 Medicine">💊 ঔষধ</a>
      <a href="#" onclick="Router.go('listing',{cat:'grocery'})" data-bn="🛒 মুদি বাজার" data-en="🛒 Grocery">🛒 মুদি বাজার</a>
      <a href="#" onclick="Router.go('listing',{cat:'gas'})" data-bn="🔥 গ্যাস সিলিন্ডার" data-en="🔥 Gas Cylinder">🔥 গ্যাস সিলিন্ডার</a>
      <a href="#" onclick="Router.go('listing',{cat:'cosmetics'})" data-bn="💄 কসমেটিকস" data-en="💄 Cosmetics">💄 কসমেটিকস</a>
      <a href="#" onclick="Router.go('listing',{cat:'flash'})" data-bn="🔥 ফ্ল্যাশ সেল" data-en="🔥 Flash Sale">🔥 ফ্ল্যাশ সেল</a>
    </div>
  </nav>
</header>
