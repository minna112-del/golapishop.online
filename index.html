<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golapi Shop Online</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:wght@400;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- আপনার টপ বার, হেডার, নেভিগেশন (আগের কোড অনুযায়ী রাখুন) -->

<main id="appRoot">

    <!-- অন্যান্য পেজ আপনার আগের কোড অনুযায়ী রাখুন -->

    <!-- ===================== HEALTH SERVICE ===================== -->
    <div class="page" id="page-health">
        <section class="max-w-7xl mx-auto px-4 py-8">
            <div class="breadcrumb"><a href="#" onclick="go('home')">হোম</a> &gt; 🩺 গোলাপি ফ্রি স্বাস্থ্য সেবা</div>
            
            <div class="hero-bg text-center py-16 rounded-3xl mb-12">
                <h1 class="text-4xl font-bold text-white">🌹 গোলাপি ফ্রি স্বাস্থ্য সেবা</h1>
                <p class="text-slate-300 mt-4 text-lg">নোয়াখালীর অভিজ্ঞ ডাক্তারদের সাথে ফ্রি পরামর্শ</p>
            </div>

            <h2 class="text-2xl font-semibold mb-6">🩺 ডাক্তার লিস্ট</h2>
            <div id="doctorList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

            <div class="mt-12 grid md:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-xl mb-4">📅 ভিজিট সিডিউল</h3>
                    <table class="data-table w-full" id="scheduleTable"></table>
                </div>
                <div>
                    <h3 class="text-xl mb-4">📝 অ্যাপয়েন্টমেন্ট</h3>
                    <button onclick="HealthService.bookAppointment()" class="btn-medical w-full py-4 text-lg">এপয়েন্টমেন্ট নিন</button>
                </div>
            </div>

            <div class="mt-12">
                <h2 class="text-2xl mb-4">🤖 AI প্রাথমিক পরামর্শ</h2>
                <div id="aiHealthChat" class="glass p-6 rounded-2xl min-h-[220px]"></div>
            </div>
        </section>
    </div>

</main>

<script src="js/router.js"></script>
<script src="js/health.js"></script>
<script src="js/app.js"></script>

</body>
</html>
