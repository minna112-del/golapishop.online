<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golapi Shop Online</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<button onclick="showHealth()">🩺 গোলাপি স্বাস্থ্য সেবা দেখুন</button>

<div id="healthPage" style="display:none; padding:20px; background:#111; color:white; min-height:100vh;">
  <h1>🌹 গোলাপি ফ্রি স্বাস্থ্য সেবা</h1>
  <div id="doctorList"></div>
  <button onclick="book()">এপয়েন্টমেন্ট নিন</button>
</div>

<script>
function showHealth() {
  document.getElementById('healthPage').style.display = 'block';
  document.getElementById('doctorList').innerHTML = `
    <p>ডাঃ রহিম উদ্দিন - মেডিসিন</p>
    <p>ডাঃ করিনা আক্তার - গাইনি</p>
  `;
}
function book() {
  alert('✅ অ্যাপয়েন্টমেন্ট রিকোয়েস্ট পাঠানো হয়েছে');
}
</script>

</body>
</html>
